name: Metrics
on:
  schedule:
      - cron: "0 * * * *"
        workflow_dispatch:
          push:
              branches:
                    - main
                    jobs:
                      github-metrics:
                          runs-on: ubuntu-latest
                              permissions:
                                    contents: write
                                        steps:
                                              - uses: lowlighter/metrics@v3.34
                                                      with:
                                                                token: ${{ secrets.METRICS_TOKEN }}
                                                                          user: Sabeeh-hack
                                                                                    template: classic
                                                                                              base: header, community, repositories, metadata
                                                                                                        config_timezone: UTC
                                                                                                        
