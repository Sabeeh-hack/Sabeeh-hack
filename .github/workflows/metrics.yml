name: Metrics
on:
  # Schedule updates (each hour)
    schedule: [{cron: "0 * * * *"}]
      # Lines below let you run workflow manually and on each commit
        workflow_dispatch:
          push: {branches: ["master", "main"]}
          jobs:
            github-metrics:
                runs-on: ubuntu-latest
                    permissions:
                          contents: write
                              steps:
                                    - uses: lowlighter/metrics@v3.34
                                            with:
                                                      # Your GitHub token
                                                                # The following token permissions are required:
                                                                          #  - public_repo (read-only)
                                                                                    #  - repo (read-only) (optional, if you want to include private repositories)
                                                                                              token: ${{ secrets.METRICS_TOKEN }}

                                                                                                        # Options
                                                                                                                  user: Sabeeh-hack
                                                                                                                            template: classic
                                                                                                                                      base: header, community, repositories, metadata
                                                                                                                                                config_timezone: UTC
                                                                                                                                                
